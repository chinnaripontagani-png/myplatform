<!DOCTYPE html>
<html>
<head>
<title>Zoe Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjijQvDpWET8ijG1CJ2YXlJxq50Ds6RBY",
  authDomain: "myplatform-30491.firebaseapp.com",
  projectId: "myplatform-30491",
  databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allBusinesses = [];
let selectedUser = "";
let currentUser = "";

// LOGIN
window.login = function(){
    currentUser = username.value;
    if(!currentUser) return alert("Enter username");

    localStorage.setItem("user", currentUser);
    loginSection.style.display="none";
    mainSection.classList.remove("hidden");
};

// LOGOUT
window.logout = function(){
    localStorage.removeItem("user");
    location.reload();
};

window.onload = function(){
    currentUser = localStorage.getItem("user");
    if(currentUser){
        loginSection.style.display="none";
        mainSection.classList.remove("hidden");
    }
};

// ADD BUSINESS
window.addBusiness = function(){
    const name=bname.value;
    const owner=oname.value;
    const type=btype.value;

    if(!name||!owner||!type){
        alert("Fill all fields");
        return;
    }

    const newBiz={name,owner,type};
    push(ref(db,"businesses"), newBiz);

    showMatches(newBiz);

    bname.value="";
    oname.value="";
    btype.value="";
};

// DISPLAY BUSINESSES
onChildAdded(ref(db,"businesses"), snap=>{
    const d=snap.val();
    allBusinesses.push(d);

    const div=document.createElement("div");
    div.className="businessCard";
    div.innerHTML=`<h4>${d.name}</h4><p>${d.owner}</p><p>${d.type}</p>`;
    businessList.appendChild(div);
});

// MATCHES
function showMatches(newBiz){
    matchBox.innerHTML="";

    allBusinesses.forEach(b=>{
        if(b.type!==newBiz.type){
            const match=document.createElement("div");
            match.className="matchCard";
            match.innerHTML=`<b>${b.name}</b><br>${b.owner}<br>${b.type}`;

            match.onclick=function(){
                selectedUser=b.owner;
                privateChatBox.innerHTML="Chat with "+selectedUser;
            };

            matchBox.appendChild(match);
        }
    });
}

// SEND PRIVATE
window.sendPrivate=function(){
    const msg=privateMsg.value;

    if(!selectedUser){
        alert("Select a match first");
        return;
    }

    push(ref(db,"privateChats"),{
        from:currentUser,
        to:selectedUser,
        text:msg
    });

    privateMsg.value="";
};

// RECEIVE PRIVATE (FIXED)
onChildAdded(ref(db,"privateChats"), snap=>{
    const d=snap.val();

    if(
        (d.from===currentUser && d.to===selectedUser) ||
        (d.from===selectedUser && d.to===currentUser)
    ){
        const m=document.createElement("div");
        m.innerHTML=`<b>${d.from}</b>: ${d.text}`;
        privateChatBox.appendChild(m);
    }
});

// GLOBAL CHAT
window.sendMessage=function(){
    push(ref(db,"messages"),{
        user:currentUser,
        text:message.value
    });
    message.value="";
};

onChildAdded(ref(db,"messages"), snap=>{
    const d=snap.val();
    const m=document.createElement("div");
    m.innerHTML=`<b>${d.user}</b>: ${d.text}`;
    chat.appendChild(m);
});

// SEARCH
window.searchBusiness=function(){
    const val=search.value.toLowerCase();
    const cards=document.getElementsByClassName("businessCard");

    for(let c of cards){
        c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
    }
};
</script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef2f7;}
header{
    background:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.container{padding:20px;max-width:900px;margin:auto;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
input{width:100%;padding:10px;margin:5px 0;}
button{padding:10px;background:#0a7cff;color:white;border:none;border-radius:5px;cursor:pointer;}
.businessCard,.matchCard{background:white;padding:10px;border-radius:10px;margin:5px;}
#matchBox{display:flex;flex-wrap:wrap;}
#chat,#privateChatBox{height:150px;overflow-y:auto;background:#fff;padding:10px;border-radius:8px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Zoe Platform</h2>
<div>
<span>Business Network</span>
<button onclick="logout()">Logout</button>
</div>
</header>

<div id="loginSection" class="container">
<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Enter username">
<button onclick="login()">Enter</button>
</div>
</div>

<div id="mainSection" class="container hidden">

<div class="card">
<h3>Add Business</h3>
<input id="bname" placeholder="Business Name">
<input id="oname" placeholder="Owner Name">
<input id="btype" placeholder="Business Type">
<button onclick="addBusiness()">Add</button>
</div>

<div class="card">
<h3>Search</h3>
<input id="search" onkeyup="searchBusiness()" placeholder="Search...">
</div>

<div id="businessList"></div>

<div class="card">
<h3>🤝 Matches (Click to chat)</h3>
<div id="matchBox"></div>
</div>

<div class="card">
<h3>🔒 Private Chat</h3>
<div id="privateChatBox"></div>
<input id="privateMsg" placeholder="Type private message">
<button onclick="sendPrivate()">Send</button>
</div>

<div class="card">
<h3>🌍 Global Chat</h3>
<div id="chat"></div>
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</body>
</html>
