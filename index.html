<!DOCTYPE html>
<html>
<head>
<title>Zoe Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjijQvDpWET8ijG1CJ2YXlJxq50Ds6RBY",
  authDomain: "myplatform-30491.firebaseapp.com",
  databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com",
  projectId: "myplatform-30491"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = "";
let selectedUser = "";
let businesses = [];
let messages = [];
let notifications = {};

// LOGIN
window.login = function(){
    currentUser = username.value;
    if(!currentUser){
        alert("Enter username");
        return;
    }
    localStorage.setItem("user", currentUser);
    location.reload();
};

// AUTO LOGIN
window.onload = function(){
    currentUser = localStorage.getItem("user");

    if(currentUser){
        loginSection.style.display="none";
        mainSection.classList.remove("hidden");
    }
};

// LOGOUT
window.logout = function(){
    localStorage.clear();
    location.reload();
};

// ADD BUSINESS
window.addBusiness = function(){
    push(ref(db,"businesses"),{
        name:bname.value,
        owner:oname.value,
        type:btype.value
    });
};

// LOAD BUSINESSES
onValue(ref(db,"businesses"), snap=>{
    businesses=[];
    snap.forEach(c=>businesses.push(c.val()));
    renderBusinesses();
});

// RENDER BUSINESSES
function renderBusinesses(){
    businessList.innerHTML="";

    businesses.forEach(b=>{
        const div=document.createElement("div");

        let notify = notifications[b.owner] ? " 🔴 New" : "";

        div.innerHTML = `<b>${b.name}</b>${notify}<br>${b.owner}<br>${b.type}`;
        div.className="businessCard";

        div.onclick=function(){
            selectedUser = b.owner;
            chatSection.style.display="block";
            chatTitle.innerText="Chat with "+selectedUser;

            notifications[selectedUser]=false;
            renderBusinesses();
            renderMessages();
        };

        businessList.appendChild(div);
    });
}

// SEND MESSAGE
window.sendPrivate = function(){
    const msg = privateMsg.value;

    push(ref(db,"privateChats"),{
        from:currentUser,
        to:selectedUser,
        text:msg
    });

    privateMsg.value="";
};

// 🔥 SINGLE GLOBAL LISTENER (FIX)
onValue(ref(db,"privateChats"), snap=>{
    messages=[];

    snap.forEach(c=>{
        const d=c.val();
        messages.push(d);

        // NOTIFICATION
        if(d.to===currentUser && d.from!==selectedUser){
            notifications[d.from]=true;
        }
    });

    renderBusinesses();
    renderMessages();
});

// SHOW CHAT
function renderMessages(){
    privateChatBox.innerHTML="";

    messages.forEach(d=>{
        if(
            (d.from===currentUser && d.to===selectedUser) ||
            (d.from===selectedUser && d.to===currentUser)
        ){
            const div=document.createElement("div");
            div.innerHTML=`<b>${d.from}</b>: ${d.text}`;
            privateChatBox.appendChild(div);
        }
    });
}

</script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}
header{background:white;padding:10px;display:flex;justify-content:space-between;}
.container{padding:20px;max-width:900px;margin:auto;}
.card{background:white;padding:20px;margin:10px;border-radius:10px;}
input{width:100%;padding:10px;margin:5px 0;}
button{padding:10px;background:#007bff;color:white;border:none;border-radius:5px;}
.businessCard{background:#fff;padding:10px;margin:5px;border-radius:8px;cursor:pointer;}
#privateChatBox{height:200px;overflow-y:auto;background:#fafafa;padding:10px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Zoe Platform</h2>
<button onclick="logout()">Logout</button>
</header>

<div id="loginSection" class="container">
<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Username">
<button onclick="login()">Login</button>
</div>
</div>

<div id="mainSection" class="container hidden">

<div class="card">
<h3>Add Business</h3>
<input id="bname" placeholder="Business Name">
<input id="oname" placeholder="Owner Name">
<input id="btype" placeholder="Business Type">
<button onclick="addBusiness()">Add</button>
</div>

<div class="card">
<h3>Businesses</h3>
<div id="businessList"></div>
</div>

<div id="chatSection" class="card" style="display:none;">
<h3 id="chatTitle">Chat</h3>
<div id="privateChatBox"></div>
<input id="privateMsg" placeholder="Type message">
<button onclick="sendPrivate()">Send</button>
</div>

</div>

</body>
</html>
