<!DOCTYPE html>
<html>
<head>
    <title>Abhishek Zoe Global Platform</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 250px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

        ul {
            list-style: none;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h2>🌍 Global Business Chat</h2>

<input type="text" id="username" placeholder="Enter your name">
<br>

<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script>
    // 🔥 Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBjijQvDpWET8ijG1CJ2YXlJxq50Ds6RBY",
        authDomain: "myplatform-30491.firebaseapp.com",
        projectId: "myplatform-30491",
        storageBucket: "myplatform-30491.appspot.com",
        messagingSenderId: "103462843726",
        appId: "1:103462843726:web:d3611bdb15274010e67a1f",
        databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendMessage() {
        var user = document.getElementById("username").value;
        var msg = document.getElementById("message").value;

        if(user === "" || msg === "") {
            alert("Enter name and message");
            return;
        }

        db.ref("messages").push({
            user: user,
            text: msg
        });

        document.getElementById("message").value = "";
    }

    // Listen for new messages
    db.ref("messages").on("child_added", function(snapshot) {
        var data = snapshot.val();

        var li = document.createElement("li");
        li.textContent = data.user + ": " + data.text;

        document.getElementById("messages").appendChild(li);
    });
</script>

</body>
</html>
