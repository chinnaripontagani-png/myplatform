<!DOCTYPE html>
<html>
<head>
    <title>Abhishek Zoe Platform</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #0a7cff;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            background: #0a7cff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .deleteBtn {
            background: red;
            margin-left: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <header>
        🚀 Abhishek Zoe Business Platform
    </header>

    <!-- LOGIN -->
    <div id="loginSection" class="container">
        <div class="card">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Enter Username">
            <br><br>
            <button onclick="login()">Login</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="mainSection" class="hidden container">

        <div class="card">
            <h2>Register Business</h2>

            <form onsubmit="addBusiness(); return false;">
                <input type="text" placeholder="Business Name" id="bname">
                <input type="text" placeholder="Owner Name" id="oname">
                <input type="text" placeholder="Business Type" id="btype">
                <br><br>
                <button type="submit">Submit</button>
            </form>
        </div>

        <!-- SEARCH -->
        <div class="card">
            <h2>Search Business</h2>
            <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchBusiness()">
        </div>

        <h2 style="text-align:center;">Businesses</h2>
        <ul id="businessList"></ul>

    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;

            if(user === "") {
                alert("Enter username!");
                return;
            }

            localStorage.setItem("user", user);

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("mainSection").style.display = "block";
        }

        window.onload = function() {
            var savedUser = localStorage.getItem("user");

            if(savedUser) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("mainSection").style.display = "block";
            }

            loadBusinesses();
        };

        function loadBusinesses() {
            var data = JSON.parse(localStorage.getItem("businesses")) || [];
            data.forEach(displayBusiness);
        }

        function addBusiness() {
            var name = document.getElementById("bname").value;
            var owner = document.getElementById("oname").value;
            var type = document.getElementById("btype").value;

            var business = { name, owner, type };

            var data = JSON.parse(localStorage.getItem("businesses")) || [];
            data.push(business);
            localStorage.setItem("businesses", JSON.stringify(data));

            displayBusiness(business);

            document.getElementById("bname").value = "";
            document.getElementById("oname").value = "";
            document.getElementById("btype").value = "";
        }

        function displayBusiness(business) {
            var list = document.getElementById("businessList");

            var item = document.createElement("li");

            item.innerHTML =
                "<b>" + business.name + "</b><br>" +
                "Owner: " + business.owner + "<br>" +
                "Type: " + business.type +
                " <button class='deleteBtn' onclick='deleteItem(this)'>Delete</button>";

            list.appendChild(item);
        }

        function deleteItem(button) {
            var text = button.parentElement.textContent;

            var data = JSON.parse(localStorage.getItem("businesses")) || [];

            data = data.filter(function(business) {
                return !text.includes(business.name);
            });

            localStorage.setItem("businesses", JSON.stringify(data));

            button.parentElement.remove();
        }

        function searchBusiness() {
            var input = document.getElementById("searchInput").value.toLowerCase();
            var items = document.getElementById("businessList").getElementsByTagName("li");

            for (var i = 0; i < items.length; i++) {
                var text = items[i].textContent.toLowerCase();

                if (text.includes(input)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
