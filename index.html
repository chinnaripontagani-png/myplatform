<!DOCTYPE html>
<html>
<head>
<title>Zoe Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjijQvDpWET8ijG1CJ2YXlJxq50Ds6RBY",
  authDomain: "myplatform-30491.firebaseapp.com",
  projectId: "myplatform-30491",
  databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = "";
let selectedUser = "";

// LOGIN
window.login = function(){
    const user = username.value;
    const pass = password.value;

    if(!user || !pass){
        alert("Enter username & password");
        return;
    }

    currentUser = user;
    localStorage.setItem("user", user);

    loginSection.style.display="none";
    mainSection.classList.remove("hidden");
};

// LOGOUT
window.logout = function(){
    localStorage.removeItem("user");
    location.reload();
};

window.onload = function(){
    currentUser = localStorage.getItem("user");
    if(currentUser){
        loginSection.style.display="none";
        mainSection.classList.remove("hidden");
    }
};

// ADD BUSINESS
window.addBusiness = function(){
    const name=bname.value;
    const owner=oname.value;
    const type=btype.value;

    if(!name||!owner||!type){
        alert("Fill all fields");
        return;
    }

    push(ref(db,"businesses"), {name,owner,type});

    bname.value="";
    oname.value="";
    btype.value="";
};

// SHOW BUSINESSES (CLICK TO CHAT)
onChildAdded(ref(db,"businesses"), snap=>{
    const d=snap.val();

    const div=document.createElement("div");
    div.className="businessCard";
    div.innerHTML=`<h4>${d.name}</h4><p>${d.owner}</p><p>${d.type}</p>`;

    div.onclick=function(){
        selectedUser = d.owner;
        privateChatBox.innerHTML = "Chat with " + selectedUser;
    };

    businessList.appendChild(div);
});

// SEND PRIVATE
window.sendPrivate=function(){
    const msg=privateMsg.value;

    if(!selectedUser){
        alert("Click a business first");
        return;
    }

    push(ref(db,"privateChats"),{
        from:currentUser,
        to:selectedUser,
        text:msg
    });

    privateMsg.value="";
};

// RECEIVE PRIVATE (ONLY 2 USERS)
onChildAdded(ref(db,"privateChats"), snap=>{
    const d=snap.val();

    if(
        (d.from===currentUser && d.to===selectedUser) ||
        (d.from===selectedUser && d.to===currentUser)
    ){
        const m=document.createElement("div");
        m.innerHTML=`<b>${d.from}</b>: ${d.text}`;
        privateChatBox.appendChild(m);
    }
});
</script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef2f7;}
header{background:white;padding:15px;display:flex;justify-content:space-between;}
.container{padding:20px;max-width:900px;margin:auto;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
input{width:100%;padding:10px;margin:5px 0;}
button{padding:10px;background:#0a7cff;color:white;border:none;border-radius:5px;cursor:pointer;}
.businessCard{background:white;padding:10px;border-radius:10px;margin:5px;cursor:pointer;}
#privateChatBox{height:200px;overflow-y:auto;background:#fff;padding:10px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Zoe Platform</h2>
<button onclick="logout()">Logout</button>
</header>

<!-- LOGIN -->
<div id="loginSection" class="container">
<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainSection" class="container hidden">

<div class="card">
<h3>Add Business</h3>
<input id="bname" placeholder="Business Name">
<input id="oname" placeholder="Owner Name">
<input id="btype" placeholder="Business Type">
<button onclick="addBusiness()">Add</button>
</div>

<div class="card">
<h3>📋 All Businesses (Click to Chat)</h3>
<div id="businessList"></div>
</div>

<div class="card">
<h3>🔒 Private Chat</h3>
<div id="privateChatBox"></div>
<input id="privateMsg" placeholder="Type message">
<button onclick="sendPrivate()">Send</button>
</div>

</div>

</body>
</html>
