<!DOCTYPE html>
<html>
<head>
    <title>Abhishek Zoe Platform</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #d0f0ff;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .deleteBtn {
            background-color: red;
            color: white;
            border: none;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username"><br>
        <button onclick="login()">Login</button>
    </div>

    <!-- MAIN PLATFORM -->
    <div id="mainSection" class="hidden">

        <h1 style="color:green;">Abhishek Zoe Business Platform</h1>
        <p>Connect. Negotiate. Grow.</p>

        <h2>Register Your Business</h2>

        <form onsubmit="addBusiness(); return false;">
            <input type="text" placeholder="Business Name" id="bname"><br>
            <input type="text" placeholder="Owner Name" id="oname"><br>
            <input type="text" placeholder="Business Type" id="btype"><br>
            <button type="submit">Submit</button>
        </form>

        <h2>Registered Businesses</h2>
        <ul id="businessList"></ul>

    </div>

    <script>
        // LOGIN FUNCTION
        function login() {
            var user = document.getElementById("username").value;

            if(user === "") {
                alert("Enter username!");
                return;
            }

            localStorage.setItem("user", user);

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("mainSection").style.display = "block";
        }

        // AUTO LOGIN
        window.onload = function() {
            var savedUser = localStorage.getItem("user");

            if(savedUser) {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("mainSection").style.display = "block";
            }

            loadBusinesses();
        };

        // LOAD BUSINESSES
        function loadBusinesses() {
            var data = JSON.parse(localStorage.getItem("businesses")) || [];
            data.forEach(displayBusiness);
        }

        // ADD BUSINESS
        function addBusiness() {
            var name = document.getElementById("bname").value;
            var owner = document.getElementById("oname").value;
            var type = document.getElementById("btype").value;

            var business = { name, owner, type };

            var data = JSON.parse(localStorage.getItem("businesses")) || [];
            data.push(business);
            localStorage.setItem("businesses", JSON.stringify(data));

            displayBusiness(business);

            document.getElementById("bname").value = "";
            document.getElementById("oname").value = "";
            document.getElementById("btype").value = "";
        }

        // DISPLAY
        function displayBusiness(business) {
            var list = document.getElementById("businessList");

            var item = document.createElement("li");

            item.innerHTML =
                "Business: " + business.name +
                " | Owner: " + business.owner +
                " | Type: " + business.type +
                " <button class='deleteBtn' onclick='deleteItem(this)'>Delete</button>";

            list.appendChild(item);
        }

        // DELETE
        function deleteItem(button) {
            var text = button.parentElement.textContent;

            var data = JSON.parse(localStorage.getItem("businesses")) || [];

            data = data.filter(function(business) {
                return !text.includes(business.name);
            });

            localStorage.setItem("businesses", JSON.stringify(data));

            button.parentElement.remove();
        }
    </script>

</body>
</html>
