<!DOCTYPE html>
<html>
<head>
    <title>Global Chat</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h2>🌍 Global Chat</h2>

<input id="username" placeholder="Enter name"><br>
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBjijQvDpWET8ijG1CJ2YXlJxq50Ds6RBY",
  authDomain: "myplatform-30491.firebaseapp.com",
  projectId: "myplatform-30491",
  storageBucket: "myplatform-30491.appspot.com",
  messagingSenderId: "103462843726",
  appId: "1:103462843726:web:d3611bdb15274010e67a1f",
  databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendMessage = function() {
    const user = document.getElementById("username").value;
    const msg = document.getElementById("message").value;

    if(user === "" || msg === "") {
        alert("Enter name and message");
        return;
    }

    push(ref(db, "messages"), {
        user: user,
        text: msg
    });

    document.getElementById("message").value = "";
};

onChildAdded(ref(db, "messages"), (snapshot) => {
    const data = snapshot.val();

    const li = document.createElement("li");
    li.textContent = data.user + ": " + data.text;

    document.getElementById("messages").appendChild(li);
});
</script>

</body>
</html>
