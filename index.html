<!DOCTYPE html>
<html>
<head>
<title>Zoe Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "myplatform-30491.firebaseapp.com",
  projectId: "myplatform-30491",
  databaseURL: "https://myplatform-30491-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let selectedUser = "";
let currentUser = "";

// LOGIN
window.login = function(){
    currentUser = username.value;
    localStorage.setItem("user", currentUser);

    loginSection.style.display="none";
    mainSection.classList.remove("hidden");
};

window.onload = function(){
    currentUser = localStorage.getItem("user");
    if(currentUser){
        loginSection.style.display="none";
        mainSection.classList.remove("hidden");
    }
};

// SELECT USER
window.selectUser = function(name){
    selectedUser = name;
    privateChatBox.innerHTML = "Chat with " + name;
};

// SEND PRIVATE
window.sendPrivate = function(){
    const msg = privateMsg.value;

    if(!selectedUser){
        alert("Select user first");
        return;
    }

    push(ref(db,"privateChats"),{
        from: currentUser,
        to: selectedUser,
        text: msg
    });

    privateMsg.value="";
};

// RECEIVE PRIVATE (FIXED)
onChildAdded(ref(db,"privateChats"), snap=>{
    const d = snap.val();

    if(
        (d.from === currentUser && d.to === selectedUser) ||
        (d.from === selectedUser && d.to === currentUser)
    ){
        const m = document.createElement("div");
        m.innerHTML = `<b>${d.from}</b>: ${d.text}`;
        privateChatBox.appendChild(m);
    }
});
</script>

<style>
body{font-family:Arial;background:#eef2f7}
.card{background:white;padding:15px;margin:10px;border-radius:10px}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginSection" class="card">
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>

<div id="mainSection" class="hidden">

<div class="card">
<h3>Select User</h3>
<button onclick="selectUser('User1')">User1</button>
<button onclick="selectUser('User2')">User2</button>
</div>

<div class="card">
<h3>Private Chat</h3>
<div id="privateChatBox"></div>
<input id="privateMsg">
<button onclick="sendPrivate()">Send</button>
</div>

</div>

</body>
</html>
